name: Build LP cases (static injection)

on:
  schedule:
    - cron: '15 18 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tools/build-lp-cases.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add product-manga.html recruit-manga.html manga-ad-lp.html company-manga.html sales-manga.html training-manga.html inbound-manga.html ir-manga.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(lp-cases): auto-inject static cases from WP [skip ci]"
          git push
