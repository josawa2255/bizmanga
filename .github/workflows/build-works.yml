name: Build works static pages

on:
  # 毎日 18:00 UTC = 翌03:00 JST に実行 (WP編集の翌朝には反映)。
  # 旧: 週1 (土曜のみ) で WP 編集から最大1週間反映遅延。同症状の予防で日次化
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tools/build-works.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add works.html works/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(works): auto-rebuild static pages [skip ci]"
          git push
