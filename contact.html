  <script>
    /**
     * BizManga お問い合わせフォーム → HubSpot送信
     * トラッキング: pageUri / pageName でビズマンガからの問い合わせと識別
     * URLパラメータ ?plan=xxx がある場合はメッセージ欄に自動入力
     */
    (function() {
      var HUBSPOT_PORTAL_ID = '48367061';
      var HUBSPOT_FORM_GUID = 'b6da14d0-d60d-4357-89fc-0015ed32b704';

      // プランパラメータ自動入力
      var params = new URLSearchParams(window.location.search);
      var plan = params.get('plan');
      if (plan) {
        var msgField = document.getElementById('bmMessage');
        if (msgField) {
          var planNames = { light: 'ライトプラン', standard: 'スタンダードプラン', premium: 'プレミアムプラン' };
          msgField.value = '【' + (planNames[plan] || plan) + 'について】\n\n';
        }
      }

document.getElementById('bmContactForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var submitBtn = e.target.querySelector('.bm-form-submit');
        submitBtn.disabled = true;
        submitBtn.classList.add('is-sending');

        var company    = document.getElementById('bmCompany').value;
        var department = document.getElementById('bmDepartment').value;
        var fullName   = document.getElementById('bmName').value;
        var email      = document.getElementById('bmEmail').value;
        var message    = document.getElementById('bmMessage').value;

        // 流入元トラッキング情報を付加
        var tracking = ['[BizManga経由のお問い合わせ]'];
        if (plan) tracking.push('選択プラン: ' + (plan.charAt(0).toUpperCase() + plan.slice(1)));
        var utmSource   = params.get('utm_source');
        var utmMedium   = params.get('utm_medium');
        var utmCampaign = params.get('utm_campaign');
        var source      = params.get('source');
        if (utmSource)   tracking.push('流入元: ' + utmSource);
        if (utmMedium)   tracking.push('媒体: ' + utmMedium);
        if (utmCampaign) tracking.push('キャンペーン: ' + utmCampaign);
        if (source)      tracking.push('参照ページ: ' + source);
        tracking.push('ページ: ' + window.location.href);
        var behaviorLog = typeof window.bmGetTrackingNote === 'function' ? window.bmGetTrackingNote() : '';
        var trackingNote = '\n\n---\n' + tracking.join('\n') + behaviorLog;

        var payload = {
          fields: [
            { name: 'company',   value: company },
            { name: 'busyo',     value: department },
            { name: 'lastname',  value: fullName },
            { name: 'firstname', value: fullName },
            { name: 'email',     value: email },
            { name: 'message',   value: message + trackingNote }
          ],
          context: {
            pageUri:  window.location.href,
            pageName: 'BizManga - お問い合わせ'
          }
        };

        var url = 'https://api.hsforms.com/submissions/v3/integration/submit/'
          + HUBSPOT_PORTAL_ID + '/' + HUBSPOT_FORM_GUID;

        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(function(res) {
          if (res.ok) return res.json();
          return res.text().then(function(t) { throw new Error(t); });
        })
        .then(function() {
          var form = document.getElementById('bmContactForm');
          var thanks = document.createElement('div');
          thanks.innerHTML = '<div style="text-align:center;padding:40px 0;">'
            + '<p style="font-size:20px;font-weight:700;color:var(--bm-accent);margin-bottom:12px;">お問い合わせありがとうございます。</p>'
            + '<p style="font-size:15px;color:var(--bm-text-muted);">3営業日以内にご連絡いたします。</p>'
            + '</div>';
          form.parentNode.insertBefore(thanks, form.nextSibling);
          form.style.display = 'none';
        })
        .catch(function(err) {
          console.error('HubSpot submission error:', err);
          submitBtn.disabled = false;
          submitBtn.classList.remove('is-sending');
          alert('送信に失敗しました。お手数ですが、もう一度お試しください。');
        });
      });
    })();
  </script>
