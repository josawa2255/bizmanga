<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Embed Viewer — BizManga</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
    }
    #viewer {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: auto;
      background: #fafafa;
      overscroll-behavior: contain;
    }
    #viewer::-webkit-scrollbar { display: none; }
    #viewer { -ms-overflow-style: none; scrollbar-width: none; }

    /* 縦読みモード */
    .page-stack {
      display: flex;
      flex-direction: column;
    }
    .page-stack img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 見開きモード: ビューアを固定 + スクロール無効 + 2ページ並び + ページ捲りアニメ */
    #viewer.is-spread {
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: center;
      perspective: 1400px;
    }
    .page-stack.spread-mode {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      transition:
        transform 0.42s cubic-bezier(0.65, 0.05, 0.36, 1),
        opacity 0.42s ease,
        filter 0.42s ease;
      transform-origin: right center;
    }
    .page-stack.spread-mode.single-page {
      grid-template-columns: 1fr;
    }
    .page-stack.spread-mode img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fafafa;
    }
    /* 捲り始め: 右端を軸にページが奥へ傾く */
    .page-stack.spread-mode.flipping-out {
      transform: perspective(1400px) rotateY(-78deg);
      opacity: 0;
      filter: brightness(0.55);
    }
    /* 次ページが左軸から現れてフラットに戻る */
    .page-stack.spread-mode.flipping-in {
      transform: perspective(1400px) rotateY(78deg);
      transform-origin: left center;
      opacity: 0;
      filter: brightness(0.55);
      transition: none;
    }
    /* 右ページだけ紙めくり影 */
    .page-stack.spread-mode.flipping-out img:nth-child(2) {
      box-shadow: -8px 0 14px rgba(0,0,0,0.22);
    }

    /* ローディング */
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #888;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    .loading::after {
      content: '';
      width: 18px; height: 18px;
      margin-left: 10px;
      border: 2px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loading">LOADING</div>
  <div id="viewer">
    <div class="page-stack" id="pageStack"></div>
  </div>

  <script>
  (function() {
    'use strict';

    // ===== パラメータ =====
    var params = new URLSearchParams(location.search);
    var mangaId = params.get('manga') || '';
    var autoScroll = params.get('autoscroll') !== '0';  // 縦読み: デフォルトON
    var speed = parseFloat(params.get('speed') || '0.5');
    var flipMs = parseInt(params.get('flipms') || '2000', 10);  // 見開き: ページ捲り間隔

    if (!mangaId) {
      document.getElementById('loading').textContent = 'NO MANGA ID';
      return;
    }

    var viewer = document.getElementById('viewer');
    var stack  = document.getElementById('pageStack');
    var loading = document.getElementById('loading');

    var WP_API = 'https://cms.contentsx.jp/wp-json/contentsx/v1';

    // ===== ルーター =====
    function render(data) {
      if (!data || !data.gallery || data.gallery.length === 0) {
        loading.textContent = 'NO PAGES';
        return;
      }
      loading.style.display = 'none';
      var isVertical = data.view_type === 'vertical_only' || data.view_type === 'vertical';
      if (isVertical) renderVertical(data);
      else renderSpreadFlip(data);
    }

    // ===== 縦読み: 既存の無限自動スクロール =====
    function renderVertical(data) {
      for (var rep = 0; rep < 2; rep++) {
        data.gallery.forEach(function(src, i) {
          var img = document.createElement('img');
          img.src = src;
          img.alt = (data.title_ja || mangaId) + ' p' + (i + 1);
          img.loading = 'lazy';
          img.decoding = 'async';
          stack.appendChild(img);
        });
      }
      var totalImgs = stack.querySelectorAll('img').length;
      var loaded = 0;
      function onReady() { startAutoScroll(); }
      stack.querySelectorAll('img').forEach(function(img) {
        if (img.complete) { if (++loaded === totalImgs) onReady(); }
        else {
          img.addEventListener('load',  function() { if (++loaded === totalImgs) onReady(); }, { once: true });
          img.addEventListener('error', function() { if (++loaded === totalImgs) onReady(); }, { once: true });
        }
      });
      setTimeout(onReady, 1000);
    }

    var started = false;
    function startAutoScroll() {
      if (started || !autoScroll) return;
      started = true;
      var halfHeight = viewer.scrollHeight / 2;
      var paused = false;
      var resumeTimer = null;
      viewer.addEventListener('wheel', function() {
        paused = true;
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(function() { paused = false; }, 2000);
      }, { passive: true });
      function tick() {
        if (!paused) {
          viewer.scrollTop += speed;
          if (viewer.scrollTop >= halfHeight) viewer.scrollTop -= halfHeight;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ===== 見開き: 2ページ並び + 2秒ごとに自動ページ捲り（ホバー中は停止） =====
    function renderSpreadFlip(data) {
      viewer.classList.add('is-spread');
      stack.classList.add('spread-mode');

      var pages = data.gallery;
      var pairs = [];
      for (var i = 0; i < pages.length; i += 2) {
        pairs.push([pages[i], pages[i+1] || null]);
      }
      if (pairs.length === 0) { loading.textContent = 'NO PAGES'; return; }

      var currentIdx = 0;
      var isHovered = false;

      function showPair(idx, skipAnim) {
        var pair = pairs[idx];
        function swapContent() {
          while (stack.firstChild) stack.removeChild(stack.firstChild);
          stack.classList.toggle('single-page', !pair[1]);
          pair.forEach(function(src, ii) {
            if (!src) return;
            var img = document.createElement('img');
            img.src = src;
            img.alt = (data.title_ja || mangaId) + ' p' + (idx * 2 + ii + 1);
            img.decoding = 'async';
            stack.appendChild(img);
          });
        }
        if (skipAnim) { swapContent(); return; }

        // 右端軸で奥へ倒れるフェーズ
        stack.classList.add('flipping-out');
        setTimeout(function() {
          swapContent();
          // 中身を差し替えて、左端軸で手前に戻るフェーズを一瞬セット
          stack.classList.remove('flipping-out');
          stack.classList.add('flipping-in');
          // リフロー強制後に flipping-in を外してトランジションを発火
          void stack.offsetWidth;
          stack.classList.remove('flipping-in');
        }, 420);
      }

      showPair(0, true); // 初回はアニメなし
      // 次ページをプリロード
      pairs.forEach(function(pair) {
        pair.forEach(function(src) { if (src) { var pre = new Image(); pre.src = src; } });
      });

      // ホバー検出（iframe 内部の document 基準）
      document.addEventListener('mouseover', function() { isHovered = true; });
      document.addEventListener('mouseout', function(e) {
        // iframe 外に出た場合のみ hover 解除
        if (!e.relatedTarget || e.relatedTarget === null) isHovered = false;
      });
      // 念のためビューアレベルでも
      viewer.addEventListener('mouseenter', function() { isHovered = true; });
      viewer.addEventListener('mouseleave', function() { isHovered = false; });

      // モバイル: タップで一時停止（3秒）
      var touchPauseUntil = 0;
      viewer.addEventListener('touchstart', function() {
        touchPauseUntil = Date.now() + 3000;
      }, { passive: true });
      // モバイルはタップで次ページへ送る（閲覧性向上）
      viewer.addEventListener('click', function() {
        if ('ontouchstart' in window) {
          currentIdx = (currentIdx + 1) % pairs.length;
          showPair(currentIdx);
        }
      });

      setInterval(function() {
        if (isHovered) return;
        if (Date.now() < touchPauseUntil) return;
        currentIdx = (currentIdx + 1) % pairs.length;
        showPair(currentIdx);
      }, flipMs);
    }

    // ===== データ取得 =====
    fetch(WP_API + '/manga/' + encodeURIComponent(mangaId))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (data && data.gallery && data.gallery.length > 0) {
          render(data);
        } else {
          var fallback = { view_type: 'spread', gallery: [] };
          for (var i = 1; i <= 30; i++) {
            fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
          }
          render(fallback);
        }
      })
      .catch(function() {
        var fallback = { view_type: 'spread', gallery: [] };
        for (var i = 1; i <= 10; i++) {
          fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
        }
        render(fallback);
      });
  })();
  </script>
</body>
</html>
