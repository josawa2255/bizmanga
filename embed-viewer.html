<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Embed Viewer — BizManga</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
    }
    #viewer {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: auto;
      background: #fafafa;
      overscroll-behavior: contain;
    }
    #viewer::-webkit-scrollbar { display: none; }
    #viewer { -ms-overflow-style: none; scrollbar-width: none; }

    /* ============ 縦読みモード ============ */
    .page-stack {
      display: flex;
      flex-direction: column;
    }
    .page-stack img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ============ 見開きモード: 2ページ並び + cover で満遍なく埋める ============ */
    #viewer.is-spread {
      overflow: hidden;
      display: block;
    }
    .spread-book {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      perspective: 1500px;
      background: #f8f4ef;
    }
    .book-page {
      position: relative;
      overflow: hidden;
      background: #f8f4ef;
    }
    .book-page img {
      width: 100%; height: 100%;
      object-fit: cover; /* タイルをいっぱいに埋める(上下トリミング) */
      object-position: center center;
      display: block;
    }
    /* 日本漫画: 奇数=右、偶数=左 */
    #pageRight { grid-column: 2; }
    #pageLeft  { grid-column: 1; }
    /* 奇数ページ最終時(left 無し)はセンタリング */
    .spread-book.single-page { grid-template-columns: 1fr; }
    .spread-book.single-page #pageRight { grid-column: 1; }
    .spread-book.single-page #pageLeft  { display: none; }
    /* 中央のスパイン(薄く) */
    .book-spine {
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 8px;
      z-index: 20;
      background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
      pointer-events: none;
    }
    .spread-book.single-page .book-spine { display: none; }

    /* ============ フリップオーバーレイ(左半分) ============ */
    .flip-overlay {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transform-style: preserve-3d;
      pointer-events: none;
      z-index: 25;
      display: none;
      will-change: transform;
    }
    .flip-overlay.active { display: block; }
    .flip-overlay.flip-prev {
      left: 0; right: auto;
      transform-origin: right center;
    }
    .flip-face {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      background: #f8f4ef;
    }
    .flip-face img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }
    .flip-front { z-index: 2; }
    .flip-back  { transform: rotateY(180deg); z-index: 1; }

    /* フリップ中の影 */
    .page-shadow {
      position: absolute;
      top: 0; width: 80px; height: 100%;
      pointer-events: none;
      z-index: 22;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .page-shadow.active { opacity: 1; }
    .page-shadow-right {
      left: 50%;
      background: linear-gradient(to right, rgba(0,0,0,0.25), transparent);
    }
    .page-shadow-left {
      right: 50%;
      background: linear-gradient(to left, rgba(0,0,0,0.25), transparent);
    }

    /* ローディング */
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #888;
      font-size: 12px;
      letter-spacing: 0.1em;
      z-index: 50;
    }
    .loading::after {
      content: '';
      width: 18px; height: 18px;
      margin-left: 10px;
      border: 2px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loading">LOADING</div>
  <div id="viewer">
    <!-- 縦読み用 -->
    <div class="page-stack" id="pageStack"></div>
    <!-- 見開き用（ビズ書庫と同構造） -->
    <div class="spread-book" id="spreadBook" style="display:none">
      <div class="book-page" id="pageRight"><img id="imgRight" alt=""></div>
      <div class="book-page" id="pageLeft"><img id="imgLeft" alt=""></div>
      <div class="book-spine"></div>
      <div class="flip-overlay" id="flipOverlay">
        <div class="flip-face flip-front"><img id="flipFrontImg" alt=""></div>
        <div class="flip-face flip-back"><img id="flipBackImg" alt=""></div>
      </div>
      <div class="page-shadow page-shadow-right" id="pageShadowRight"></div>
      <div class="page-shadow page-shadow-left" id="pageShadowLeft"></div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    var params = new URLSearchParams(location.search);
    var mangaId = params.get('manga') || '';
    var autoScroll = params.get('autoscroll') !== '0';
    var speed = parseFloat(params.get('speed') || '0.5');
    var flipMs = parseInt(params.get('flipms') || '2000', 10);

    if (!mangaId) {
      document.getElementById('loading').textContent = 'NO MANGA ID';
      return;
    }

    var viewer   = document.getElementById('viewer');
    var stack    = document.getElementById('pageStack');
    var loading  = document.getElementById('loading');
    var spreadBook   = document.getElementById('spreadBook');
    var pageRight    = document.getElementById('pageRight');
    var pageLeft     = document.getElementById('pageLeft');
    var imgRight     = document.getElementById('imgRight');
    var imgLeft      = document.getElementById('imgLeft');
    var flipOverlay  = document.getElementById('flipOverlay');
    var flipFrontImg = document.getElementById('flipFrontImg');
    var flipBackImg  = document.getElementById('flipBackImg');
    var pageShadowRight = document.getElementById('pageShadowRight');
    var pageShadowLeft  = document.getElementById('pageShadowLeft');

    var WP_API = 'https://cms.contentsx.jp/wp-json/contentsx/v1';

    function render(data) {
      if (!data || !data.gallery || data.gallery.length === 0) {
        loading.textContent = 'NO PAGES';
        return;
      }
      loading.style.display = 'none';
      var isVertical = data.view_type === 'vertical_only' || data.view_type === 'vertical';
      if (isVertical) renderVertical(data);
      else renderSpreadFlip(data);
    }

    // ============ 縦読み: 無限自動スクロール ============
    function renderVertical(data) {
      spreadBook.style.display = 'none';
      stack.style.display = '';
      for (var rep = 0; rep < 2; rep++) {
        data.gallery.forEach(function(src, i) {
          var img = document.createElement('img');
          img.src = src;
          img.alt = (data.title_ja || mangaId) + ' p' + (i + 1);
          img.loading = 'lazy';
          img.decoding = 'async';
          stack.appendChild(img);
        });
      }
      var totalImgs = stack.querySelectorAll('img').length;
      var loaded = 0;
      function onReady() { startAutoScroll(); }
      stack.querySelectorAll('img').forEach(function(img) {
        if (img.complete) { if (++loaded === totalImgs) onReady(); }
        else {
          img.addEventListener('load',  function() { if (++loaded === totalImgs) onReady(); }, { once: true });
          img.addEventListener('error', function() { if (++loaded === totalImgs) onReady(); }, { once: true });
        }
      });
      setTimeout(onReady, 1000);
    }

    var started = false;
    function startAutoScroll() {
      if (started || !autoScroll) return;
      started = true;
      var halfHeight = viewer.scrollHeight / 2;
      var paused = false;
      var resumeTimer = null;
      viewer.addEventListener('wheel', function() {
        paused = true;
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(function() { paused = false; }, 2000);
      }, { passive: true });
      function tick() {
        if (!paused) {
          viewer.scrollTop += speed;
          if (viewer.scrollTop >= halfHeight) viewer.scrollTop -= halfHeight;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ============ 見開き: ビズ書庫準拠のフリップアニメ ============
    function renderSpreadFlip(data) {
      viewer.classList.add('is-spread');
      stack.style.display = 'none';
      spreadBook.style.display = '';

      // 日本式右→左読みに沿って 2ページずつペアリング
      // pair[0] = 奇数ページ(右)、pair[1] = 偶数ページ(左)
      var pages = data.gallery;
      var pairs = [];
      for (var i = 0; i < pages.length; i += 2) {
        pairs.push([pages[i], pages[i+1] || null]);
      }
      if (pairs.length === 0) { loading.textContent = 'NO PAGES'; return; }

      // プリロード
      pages.forEach(function(src) { var pre = new Image(); pre.src = src; });

      var currentIdx = 0;
      var isFlipping = false;
      var FLIP_DURATION = 500;

      function setPage(idx) {
        var p = pairs[idx];
        imgRight.src = p[0];
        imgRight.alt = (data.title_ja || mangaId) + ' p' + (idx * 2 + 1);
        if (p[1]) {
          spreadBook.classList.remove('single-page');
          imgLeft.src = p[1];
          imgLeft.alt = (data.title_ja || mangaId) + ' p' + (idx * 2 + 2);
        } else {
          spreadBook.classList.add('single-page');
        }
      }
      setPage(0);

      // 次ページへのフリップ（日本漫画: 左ページを右にめくる）
      function goNext() {
        if (isFlipping) return;
        var nextIdx = (currentIdx + 1) % pairs.length;
        var curPair = pairs[currentIdx];
        var nextPair = pairs[nextIdx];

        isFlipping = true;

        // 左ページを右側軸で回転（flip-prev）
        flipOverlay.classList.remove('flip-next', 'flip-prev');
        flipOverlay.classList.add('flip-prev');

        flipFrontImg.src = curPair[1] || curPair[0];
        flipBackImg.src  = nextPair[0];

        flipOverlay.style.transition = 'none';
        flipOverlay.style.transform = 'rotateY(0deg)';
        flipOverlay.classList.add('active');

        pageShadowRight.classList.add('active');

        // アニメ中盤で背後の静止ページを次ペアに差替
        var halfDuration = FLIP_DURATION * 0.45;
        setTimeout(function() {
          imgRight.src = nextPair[0];
          if (nextPair[1]) {
            spreadBook.classList.remove('single-page');
            imgLeft.src = nextPair[1];
          } else {
            spreadBook.classList.add('single-page');
          }
        }, halfDuration);

        // 影を徐々に濃く→薄く
        pageShadowRight.style.transition = 'none';
        pageShadowRight.style.opacity = '0';
        setTimeout(function() {
          pageShadowRight.style.transition = 'opacity ' + (FLIP_DURATION * 0.3) + 'ms ease';
          pageShadowRight.style.opacity = '0.6';
        }, FLIP_DURATION * 0.15);
        setTimeout(function() {
          pageShadowRight.style.opacity = '0';
        }, FLIP_DURATION * 0.65);

        // フリップ本体
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            flipOverlay.style.transition = 'transform ' + FLIP_DURATION + 'ms cubic-bezier(0.3, 0.0, 0.2, 1)';
            flipOverlay.style.transform = 'rotateY(180deg)';
          });
        });

        setTimeout(function() {
          flipOverlay.classList.remove('active', 'flip-prev');
          flipOverlay.style.transition = 'none';
          flipOverlay.style.transform = '';
          pageShadowRight.classList.remove('active');
          pageShadowRight.style.transition = 'none';
          pageShadowRight.style.opacity = '';
          currentIdx = nextIdx;
          isFlipping = false;
        }, FLIP_DURATION + 30);
      }

      // ホバー検出（iframe 内 document 基準）
      var isHovered = false;
      document.addEventListener('mouseover', function() { isHovered = true; });
      document.addEventListener('mouseout', function(e) {
        if (!e.relatedTarget) isHovered = false;
      });
      viewer.addEventListener('mouseenter', function() { isHovered = true; });
      viewer.addEventListener('mouseleave', function() { isHovered = false; });

      // モバイル: タップで次ページ&一時停止
      var touchPauseUntil = 0;
      viewer.addEventListener('touchstart', function() {
        touchPauseUntil = Date.now() + 3000;
      }, { passive: true });
      viewer.addEventListener('click', function() {
        if ('ontouchstart' in window) goNext();
      });

      // 自動ページ捲り
      setInterval(function() {
        if (isHovered) return;
        if (Date.now() < touchPauseUntil) return;
        if (isFlipping) return;
        goNext();
      }, flipMs);
    }

    // ============ データ取得 ============
    fetch(WP_API + '/manga/' + encodeURIComponent(mangaId))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (data && data.gallery && data.gallery.length > 0) {
          render(data);
        } else {
          var fallback = { view_type: 'spread', gallery: [] };
          for (var i = 1; i <= 30; i++) {
            fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
          }
          render(fallback);
        }
      })
      .catch(function() {
        var fallback = { view_type: 'spread', gallery: [] };
        for (var i = 1; i <= 10; i++) {
          fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
        }
        render(fallback);
      });
  })();
  </script>
</body>
</html>
