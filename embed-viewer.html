<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Embed Viewer — BizManga</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
    }
    #viewer {
      position: absolute; inset: 0;
      overflow: hidden;
      background: #f8f4ef;
      perspective: 1500px;
    }

    /* ローディング */
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #888;
      font-size: 12px;
      letter-spacing: 0.1em;
      z-index: 50;
    }
    .loading::after {
      content: '';
      width: 18px; height: 18px;
      margin-left: 10px;
      border: 2px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ 1ページ表示(ポートレートタイル想定) ============ */
    .book-page {
      position: absolute; inset: 0;
      overflow: hidden;
      background: #f8f4ef;
    }
    .book-page img {
      width: 100%; height: 100%;
      object-fit: contain; /* タイル比=ページ比でぴったり */
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ページ捲りオーバーレイ(1ページまるごと回転) */
    .flip-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transform-origin: left center; /* 日本漫画は右→左 : 右端を持って左に倒す=左軸 */
      pointer-events: none;
      z-index: 25;
      display: none;
      will-change: transform;
    }
    .flip-overlay.active { display: block; }
    .flip-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      background: #f8f4ef;
      display: flex; align-items: center; justify-content: center;
    }
    .flip-face img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .flip-front { z-index: 2; }
    .flip-back  { transform: rotateY(180deg); z-index: 1; }

    /* フリップ中の影(静止ページ側) */
    .page-shadow {
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 100%;
      pointer-events: none;
      z-index: 22;
      opacity: 0;
      transition: opacity 0.15s;
      background: linear-gradient(to right, rgba(0,0,0,0.35), transparent);
    }
    .page-shadow.active { opacity: 1; }
  </style>
</head>
<body>
  <div class="loading" id="loading">LOADING</div>
  <div id="viewer">
    <div class="book-page" id="pageMain"><img id="imgMain" alt=""></div>
    <div class="flip-overlay" id="flipOverlay">
      <div class="flip-face flip-front"><img id="flipFrontImg" alt=""></div>
      <div class="flip-face flip-back"><img id="flipBackImg" alt=""></div>
    </div>
    <div class="page-shadow" id="pageShadow"></div>
  </div>

  <script>
  (function() {
    'use strict';

    var params = new URLSearchParams(location.search);
    var mangaId = params.get('manga') || '';
    var flipMs = parseInt(params.get('flipms') || '2000', 10);

    if (!mangaId) {
      document.getElementById('loading').textContent = 'NO MANGA ID';
      return;
    }

    var loading     = document.getElementById('loading');
    var viewer      = document.getElementById('viewer');
    var pageMain    = document.getElementById('pageMain');
    var imgMain     = document.getElementById('imgMain');
    var flipOverlay = document.getElementById('flipOverlay');
    var flipFrontImg = document.getElementById('flipFrontImg');
    var flipBackImg  = document.getElementById('flipBackImg');
    var pageShadow  = document.getElementById('pageShadow');

    var WP_API = 'https://cms.contentsx.jp/wp-json/contentsx/v1';

    function render(data) {
      if (!data || !data.gallery || data.gallery.length === 0) {
        loading.textContent = 'NO PAGES';
        return;
      }
      loading.style.display = 'none';

      var allPages = data.gallery;
      // 表紙と末尾(thanks)をスキップして本編のみ（3ページ以上ある時）
      var pages = allPages.length >= 4 ? allPages.slice(1, -1) : allPages.slice();
      if (pages.length === 0) pages = allPages.slice();

      // プリロード
      allPages.forEach(function(src) { var pre = new Image(); pre.src = src; });

      var currentIdx = 0;
      var isFlipping = false;
      var FLIP_DURATION = 600;

      imgMain.src = pages[0];
      imgMain.alt = (data.title_ja || mangaId) + ' p1';

      function goNext() {
        if (isFlipping || pages.length < 2) return;
        var nextIdx = (currentIdx + 1) % pages.length;

        isFlipping = true;

        flipFrontImg.src = pages[currentIdx];
        flipBackImg.src  = pages[nextIdx];

        flipOverlay.style.transition = 'none';
        flipOverlay.style.transform = 'rotateY(0deg)';
        flipOverlay.classList.add('active');

        pageShadow.classList.add('active');

        // アニメ中盤で背後の静止ページを次ページに差替(biz-library と同タイミング)
        var halfDuration = FLIP_DURATION * 0.45;
        setTimeout(function() {
          imgMain.src = pages[nextIdx];
        }, halfDuration);

        // 影アニメ
        pageShadow.style.transition = 'none';
        pageShadow.style.opacity = '0';
        setTimeout(function() {
          pageShadow.style.transition = 'opacity ' + (FLIP_DURATION * 0.3) + 'ms ease';
          pageShadow.style.opacity = '0.6';
        }, FLIP_DURATION * 0.15);
        setTimeout(function() {
          pageShadow.style.opacity = '0';
        }, FLIP_DURATION * 0.65);

        // フリップ本体
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            flipOverlay.style.transition = 'transform ' + FLIP_DURATION + 'ms cubic-bezier(0.3, 0.0, 0.2, 1)';
            flipOverlay.style.transform = 'rotateY(-180deg)';
          });
        });

        setTimeout(function() {
          flipOverlay.classList.remove('active');
          flipOverlay.style.transition = 'none';
          flipOverlay.style.transform = '';
          pageShadow.classList.remove('active');
          pageShadow.style.transition = 'none';
          pageShadow.style.opacity = '';
          currentIdx = nextIdx;
          isFlipping = false;
        }, FLIP_DURATION + 30);
      }

      // ホバー検出
      var isHovered = false;
      document.addEventListener('mouseover', function() { isHovered = true; });
      document.addEventListener('mouseout', function(e) {
        if (!e.relatedTarget) isHovered = false;
      });
      viewer.addEventListener('mouseenter', function() { isHovered = true; });
      viewer.addEventListener('mouseleave', function() { isHovered = false; });

      // タッチ/クリック
      var touchPauseUntil = 0;
      viewer.addEventListener('touchstart', function() {
        touchPauseUntil = Date.now() + 3000;
      }, { passive: true });
      viewer.addEventListener('click', function() {
        if ('ontouchstart' in window) goNext();
      });

      // 自動ページ捲り
      setInterval(function() {
        if (isHovered) return;
        if (Date.now() < touchPauseUntil) return;
        if (isFlipping) return;
        goNext();
      }, flipMs);
    }

    // ============ データ取得 ============
    fetch(WP_API + '/manga/' + encodeURIComponent(mangaId))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (data && data.gallery && data.gallery.length > 0) {
          render(data);
        } else {
          var fallback = { view_type: 'spread', gallery: [] };
          for (var i = 1; i <= 30; i++) {
            fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
          }
          render(fallback);
        }
      })
      .catch(function() {
        var fallback = { view_type: 'spread', gallery: [] };
        for (var i = 1; i <= 10; i++) {
          fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
        }
        render(fallback);
      });
  })();
  </script>
</body>
</html>
