<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Embed Viewer — BizManga</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
    }
    #viewer {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: auto;
      background: #fafafa;
      overscroll-behavior: contain;
    }
    #viewer::-webkit-scrollbar { display: none; }
    #viewer { -ms-overflow-style: none; scrollbar-width: none; }

    /* ============ 縦読みモード ============ */
    .page-stack {
      display: flex;
      flex-direction: column;
    }
    .page-stack img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ============ 横スクロールモード: ページを横に流して満遍なく埋める ============ */
    #viewer.is-spread {
      overflow: hidden;
      display: flex;
      align-items: stretch;
      background: #f8f4ef;
    }
    .h-strip {
      display: flex;
      flex-direction: row;
      height: 100%;
      flex-shrink: 0;
      will-change: transform;
    }
    .h-strip img {
      height: 100%;
      width: auto;
      display: block;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ローディング */
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #888;
      font-size: 12px;
      letter-spacing: 0.1em;
      z-index: 50;
    }
    .loading::after {
      content: '';
      width: 18px; height: 18px;
      margin-left: 10px;
      border: 2px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loading">LOADING</div>
  <div id="viewer">
    <!-- 縦読み用 -->
    <div class="page-stack" id="pageStack"></div>
    <!-- 横スクロール用（ページを横に並べて自動スクロール） -->
    <div class="h-strip" id="hStrip" style="display:none"></div>
  </div>

  <script>
  (function() {
    'use strict';

    var params = new URLSearchParams(location.search);
    var mangaId = params.get('manga') || '';
    var autoScroll = params.get('autoscroll') !== '0';
    var speed = parseFloat(params.get('speed') || '0.5');
    var flipMs = parseInt(params.get('flipms') || '2000', 10);

    if (!mangaId) {
      document.getElementById('loading').textContent = 'NO MANGA ID';
      return;
    }

    var viewer   = document.getElementById('viewer');
    var stack    = document.getElementById('pageStack');
    var loading  = document.getElementById('loading');
    var hStrip   = document.getElementById('hStrip');

    var WP_API = 'https://cms.contentsx.jp/wp-json/contentsx/v1';

    function render(data) {
      if (!data || !data.gallery || data.gallery.length === 0) {
        loading.textContent = 'NO PAGES';
        return;
      }
      loading.style.display = 'none';
      var isVertical = data.view_type === 'vertical_only' || data.view_type === 'vertical';
      if (isVertical) renderVertical(data);
      else renderSpreadFlip(data);
    }

    // ============ 縦読み: 無限自動スクロール ============
    function renderVertical(data) {
      hStrip.style.display = 'none';
      stack.style.display = '';
      for (var rep = 0; rep < 2; rep++) {
        data.gallery.forEach(function(src, i) {
          var img = document.createElement('img');
          img.src = src;
          img.alt = (data.title_ja || mangaId) + ' p' + (i + 1);
          img.loading = 'lazy';
          img.decoding = 'async';
          stack.appendChild(img);
        });
      }
      var totalImgs = stack.querySelectorAll('img').length;
      var loaded = 0;
      function onReady() { startAutoScroll(); }
      stack.querySelectorAll('img').forEach(function(img) {
        if (img.complete) { if (++loaded === totalImgs) onReady(); }
        else {
          img.addEventListener('load',  function() { if (++loaded === totalImgs) onReady(); }, { once: true });
          img.addEventListener('error', function() { if (++loaded === totalImgs) onReady(); }, { once: true });
        }
      });
      setTimeout(onReady, 1000);
    }

    var started = false;
    function startAutoScroll() {
      if (started || !autoScroll) return;
      started = true;
      var halfHeight = viewer.scrollHeight / 2;
      var paused = false;
      var resumeTimer = null;
      viewer.addEventListener('wheel', function() {
        paused = true;
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(function() { paused = false; }, 2000);
      }, { passive: true });
      function tick() {
        if (!paused) {
          viewer.scrollTop += speed;
          if (viewer.scrollTop >= halfHeight) viewer.scrollTop -= halfHeight;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ============ 横スクロール: 日本漫画を右→左へ自動スクロール ============
    function renderSpreadFlip(data) {
      viewer.classList.add('is-spread');
      stack.style.display = 'none';
      hStrip.style.display = '';

      // ページを順番に並べる（無限ループ用に2セット分）
      // direction: rtl 側で DOM 順が右→左で並ぶ
      for (var rep = 0; rep < 2; rep++) {
        data.gallery.forEach(function(src, i) {
          var img = document.createElement('img');
          img.src = src;
          img.alt = (data.title_ja || mangaId) + ' p' + (i + 1);
          img.loading = rep === 0 ? 'eager' : 'lazy';
          img.decoding = 'async';
          hStrip.appendChild(img);
        });
      }

      // 画像ロード完了待ちで自動スクロール開始
      var imgs = hStrip.querySelectorAll('img');
      var loaded = 0;
      function onReady() { startHorizontalScroll(); }
      imgs.forEach(function(img) {
        if (img.complete) { if (++loaded === imgs.length) onReady(); }
        else {
          img.addEventListener('load',  function() { if (++loaded === imgs.length) onReady(); }, { once: true });
          img.addEventListener('error', function() { if (++loaded === imgs.length) onReady(); }, { once: true });
        }
      });
      setTimeout(onReady, 1500);
    }

    var hStarted = false;
    function startHorizontalScroll() {
      if (hStarted) return;
      hStarted = true;

      // 半分の幅(1セット分) — ここに達したらリセットして無限ループ
      var halfWidth = hStrip.scrollWidth / 2;
      var paused = false;
      var hoverPause = false;

      // ホバー/タッチで一時停止
      viewer.addEventListener('mouseenter', function() { hoverPause = true; });
      viewer.addEventListener('mouseleave', function() { hoverPause = false; });
      document.addEventListener('mouseover', function() { hoverPause = true; });
      document.addEventListener('mouseout', function(e) {
        if (!e.relatedTarget) hoverPause = false;
      });
      viewer.addEventListener('touchstart', function() {
        paused = true;
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(function() { paused = false; }, 2500);
      }, { passive: true });
      var resumeTimer = null;
      viewer.addEventListener('wheel', function() {
        paused = true;
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(function() { paused = false; }, 2000);
      }, { passive: true });

      // 初期位置: direction:rtl の viewer では scrollLeft は負側(またはゼロ基準逆転)なので、
      // hStrip 自体を translateX で動かす方式に統一
      var pos = 0;
      function tick() {
        if (!paused && !hoverPause) {
          pos += speed;
          if (pos >= halfWidth) pos -= halfWidth;
          hStrip.style.transform = 'translateX(' + (-pos) + 'px)';
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ============ データ取得 ============
    fetch(WP_API + '/manga/' + encodeURIComponent(mangaId))
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (data && data.gallery && data.gallery.length > 0) {
          render(data);
        } else {
          var fallback = { view_type: 'spread', gallery: [] };
          for (var i = 1; i <= 30; i++) {
            fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
          }
          render(fallback);
        }
      })
      .catch(function() {
        var fallback = { view_type: 'spread', gallery: [] };
        for (var i = 1; i <= 10; i++) {
          fallback.gallery.push('https://contentsx.jp/material/manga/' + mangaId + '/' + (i < 10 ? '0' + i : '' + i) + '.webp');
        }
        render(fallback);
      });
  })();
  </script>
</body>
</html>
