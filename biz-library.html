  <!-- Twitter Card -->

  <meta name="twitter:site" content="@Bizmanga_">
  <meta name="twitter:title" content="ビズ書庫 | ビズマンガ">
  <meta name="twitter:description" content="ビズマンガのビズ書庫。ビジネス漫画の制作実績をご覧いただけます。">
  <meta name="twitter:image" content="https://bizmanga.contentsx.jp/material/images/og/og-biz-library.webp">

  <!-- Styles -->
  <link rel="stylesheet" href="css/bizmanga.css">
  <link rel="stylesheet" href="css/works.css">

  <link rel="preload" href="https://contentsx.jp/material/images/logo/bizmanga-logo.webp" as="image" type="image/webp">
  <link rel="preload" href="https://contentsx.jp/material/images/bizmanga/output_05.webp" as="image" type="image/webp">
  <link rel="preload" href="js/works.js" as="script">

  <link rel="preload" href="https://contentsx.jp/material/manga/diamond/01.webp" as="image" type="image/webp">
  <link rel="preload" href="https://contentsx.jp/material/manga/ichinohe-home/01.webp" as="image" type="image/webp">
  <link rel="preload" href="https://contentsx.jp/material/manga/omatome-ninja/01.webp" as="image" type="image/webp">
  <link rel="prefetch" href="https://contentsx.jp/material/images/backgrounds/bg_02.webp" as="image" type="image/webp">
  <link rel="prefetch" href="https://contentsx.jp/material/images/backgrounds/manga_bg_06.webp" as="image" type="image/webp">
  <!-- DNS prefetch for external resources -->
  <link rel="dns-prefetch" href="https://cms.contentsx.jp">
  <!-- Direct mode: hide library elements instantly to prevent flicker -->
  <script>if(location.search.indexOf('manga=')!==-1)document.documentElement.classList.add('direct-mode');</script>
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "ホーム",
      "item": "https://bizmanga.contentsx.jp/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "ビズ書庫",
      "item": "https://bizmanga.contentsx.jp/biz-library"
    }
  ]
}
</script>
</head>
<body>

  <!-- ===== ヘッダー（全ページ共通） ===== -->
  <header class="bm-header" id="header">
    <div class="bm-header-inner">
      <a href="./" class="bm-logo">
        <img src="https://contentsx.jp/material/images/logo/bizmanga-logo.webp" alt="BizManga" class="bm-logo-img">
      </a>
      <nav class="bm-nav" id="bmNav"><!-- bm-nav.js が生成 --></nav>
      <div class="bm-header-right">
        <a href="contact" class="bm-nav-cta" data-ja="お問い合わせ" data-en="Contact">お問い合わせ</a>
        <button class="bm-hamburger" id="bmHamburger" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== Page Hero ===== -->
  <section class="page-hero">
    <span class="page-hero-label" data-ja="BIZ LIBRARY" data-en="BIZ LIBRARY">BIZ LIBRARY</span>
    <h1 class="page-hero-title" data-ja="ビズ書庫" data-en="Biz Library">ビズ<em data-ja="書庫" data-en="Library">書庫</em></h1>
    <p class="page-hero-desc" data-ja="ここに記載しているマンガは一例です。疑問点や質問等ございましたら、お気軽にお問い合わせください！！" data-en="The manga shown here are examples. If you have any questions or inquiries, please feel free to contact us!!">
      ここに記載しているマンガは一例です。<br>
      疑問点や質問等ございましたら、お気軽にお問い合わせください！！
    </p>
  </section>

  <!-- ===== Works Section ===== -->
  <section class="works-section">
    <div class="works-filter" id="worksFilter">
      <!-- Filter buttons generated by JS -->
    </div>
    <div class="works-grid" id="worksGrid">
      <!-- Cards generated by JS -->
    </div>
    <div class="pagination-bar" id="gridPagination">
      <!-- Generated by JS -->
    </div>
    <div class="no-results" id="noResults" data-ja="該当する実績がありません。" data-en="No matching results.">
      該当する実績がありません。
    </div>
  </section>

  <!-- 制作過程セクションはホームページで表示 -->

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="footer-inner">
      <ul class="footer-links">
        <li><a href="./" data-ja="ホーム" data-en="Home">ホーム</a></li>
        <li><a href="./#about" data-ja="サービス紹介" data-en="Service">サービス紹介</a></li>
        <li><a href="biz-library" data-ja="ビズ書庫" data-en="Biz Library">ビズ書庫</a></li>
        <li><a href="contact" data-ja="お問い合わせ" data-en="Contact">お問い合わせ</a></li>
        <li><a href="privacy-policy" data-ja="プライバシーポリシー" data-en="Privacy Policy">プライバシーポリシー</a></li>
      </ul>
      <div class="footer-company" data-ja="Contents X 株式会社 ／ 東京都目黒区中目黒1-8-8 目黒F2ビル1F" data-en="Manga X Co., Ltd. / 1F Meguro F2 Building, 1-8-8 Nakameguro, Meguro-ku, Tokyo">Contents X 株式会社 ／ 東京都目黒区中目黒1-8-8 目黒F2ビル1F</div>
      <div class="footer-copy" data-ja="© 2025 ビズマンガ / Contents X 株式会社. All Rights Reserved." data-en="© 2025 BizManga / Manga X Co., Ltd. All Rights Reserved.">&copy; 2025 ビズマンガ / Contents X 株式会社. All Rights Reserved.</div>
    </div>
  </footer>

  <!-- ===== Manga Modal ===== -->
  <div class="manga-modal" id="mangaModal">
    <!-- Left Thumbnail Sidebar (PC) -->
    <nav class="modal-thumb-sidebar" id="modalThumbSidebar"></nav>

    <!-- Progress Bar -->
    <div class="modal-progress"><div class="modal-progress-fill" id="modalProgress"></div></div>

    <!-- Header -->
    <div class="modal-header" id="modalHeader">
      <div class="modal-header-left">
        <button class="modal-close" id="modalClose">&times;</button>
        <button class="view-toggle-btn" id="viewToggle" title="表示切替" style="display:none;">
          <span class="view-toggle-icon" id="viewToggleIcon"></span>
          <span class="view-toggle-label" id="viewToggleLabel"></span>
        </button>
      </div>
      <div class="modal-header-right">
        <span class="modal-title" id="modalTitle"></span>
        <span class="modal-page" id="modalPage" data-ja="1 / 8" data-en="1 / 8">1 / 8</span>
      </div>
    </div>

    <!-- Manga Content -->
    <div class="modal-manga" id="modalManga"></div>

    <!-- ===== Mobile: 1-page view ===== -->
    <div class="mobile-view" id="mobileView">
      <div class="mobile-page-container" id="mobileContainer">
        <img class="mobile-current-page" id="mobilePage" src="" alt="漫画ページ">
        <div class="bm-page-spinner"><div class="bm-page-spinner-inner"></div></div>
        <div class="mobile-flip-overlay" id="mobileFlipOverlay">
          <div class="mobile-flip-front" id="mobileFlipFront"><img id="mobileFlipFrontImg" src="" alt=""></div>
          <div class="mobile-flip-back" id="mobileFlipBack"><img id="mobileFlipBackImg" src="" alt=""></div>
        </div>
        <div class="mobile-flip-shadow" id="mobileFlipShadow"></div>
      </div>
      <div class="tap-area tap-left" id="tapLeft"></div>
      <div class="tap-area tap-right" id="tapRight"></div>
    </div>

    <!-- ===== PC: Book spread view ===== -->
    <div class="book-area" id="bookArea">
      <div class="click-zone click-zone-left" id="clickLeft"></div>
      <div class="click-zone click-zone-right" id="clickRight"></div>

      <div class="book" id="book">
        <div class="book-page book-page-right" id="pageRight">
          <div class="paper-texture"></div>
          <img id="imgRight" alt="">
          <div class="bm-page-spinner"><div class="bm-page-spinner-inner"></div></div>
        </div>
        <div class="book-page book-page-left" id="pageLeft">
          <div class="paper-texture"></div>
          <img id="imgLeft" alt="">
          <div class="bm-page-spinner"><div class="bm-page-spinner-inner"></div></div>
        </div>
        <div class="book-spine" id="bookSpine"></div>

        <!-- Flip overlay (CSS class positions it) -->
        <div class="flip-overlay" id="flipOverlay">
          <div class="flip-face flip-front" id="flipFront"><img id="flipFrontImg" src="" alt=""></div>
          <div class="flip-face flip-back" id="flipBack"><img id="flipBackImg" src="" alt=""></div>
        </div>
        <!-- Shadow cast on book pages during flip -->
        <div class="page-shadow page-shadow-left" id="pageShadowLeft"></div>
        <div class="page-shadow page-shadow-right" id="pageShadowRight"></div>
      </div>

      <span class="page-hint page-hint-right" id="hintRight" data-ja="右クリック：前へ" data-en="Right Click: Previous">右クリック：前へ</span>
      <span class="page-hint page-hint-left" id="hintLeft" data-ja="左クリック：次へ" data-en="Left Click: Next">左クリック：次へ</span>
    </div>

    <!-- Footer -->
    <div class="modal-footer" id="modalFooter" data-ja="— END —" data-en="— END —">— END —</div>

    <!-- Side Page Indicator (PC) -->
    <div class="modal-side-indicator" id="modalSideIndicator"></div>

    <!-- Bottom Navigation Bar (Spread Viewer) -->
    <div class="bottom-nav" id="bottomNav">
      <button class="nav-btn" id="navPrev" title="前のページ" data-ja="前のページ" data-en="Previous page">&#9664;</button>
      <div class="nav-scrubber-wrap">
        <input type="range" class="nav-scrubber" id="navScrubber" min="0" max="1" value="0" step="1">
        <div class="nav-thumbnails" id="navThumbs"></div>
      </div>
      <span class="nav-page-info" id="navPageInfo" data-ja="1 / 8" data-en="1 / 8">1 / 8</span>
      <button class="nav-btn" id="navNext" title="次のページ" data-ja="次のページ" data-en="Next page">&#9654;</button>
    </div>

    <!-- Zoom Controls -->
    <div class="modal-zoom-controls" id="modalZoomControls">
      <button class="modal-zoom-btn" id="modalZoomOut" data-ja="縮小" data-en="Zoom Out">−</button>
      <span class="modal-zoom-label" id="modalZoomLabel" data-ja="100%" data-en="100%">100%</span>
      <button class="modal-zoom-btn" id="modalZoomIn" data-ja="拡大" data-en="Zoom In">+</button>
      <button class="modal-zoom-btn reset" id="modalZoomReset" data-ja="リセット" data-en="Reset">Reset</button>
    </div>

    <!-- Back to Top -->
    <button class="modal-back-to-top" id="modalBackToTop" title="トップへ戻る" data-ja="トップへ戻る" data-en="Back to top">&#9650;</button>
  </div>

  <script src="js/bm-sanitize.js"></script>
  <script src="js/bm-i18n.js" defer></script>
  <script src="js/bm-nav.js" defer></script>
  <script src="js/bm-tracking.js" defer></script>
  <script src="js/works.js" defer></script>
