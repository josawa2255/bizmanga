<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お客様の声 | BizManga</title>
  <meta name="description" content="BizMangaビジネスマンガ制作サービスの導入事例・お客様の声。採用広報・社員研修・企業PR・営業資料など、実際の企業様の成功事例をご紹介します。">
  <link rel="canonical" href="https://bizmanga.contentsx.jp/testimonial-detail">

  <link rel="alternate" hreflang="ja" href="https://bizmanga.contentsx.jp/testimonial-detail">
  <link rel="alternate" hreflang="x-default" href="https://bizmanga.contentsx.jp/testimonial-detail">

  <meta property="og:title" content="お客様の声 | BizManga">
  <meta property="og:description" content="BizMangaビジネスマンガ制作サービスの導入事例・お客様の声。">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://bizmanga.contentsx.jp/testimonial-detail">
  <meta property="og:site_name" content="BizManga">
  <meta property="og:image" content="https://bizmanga.contentsx.jp/material/images/og/og-testimonials.webp">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="BizManga お客様の声">
  <meta property="og:locale" content="ja_JP">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="お客様の声 | BizManga">
  <meta name="twitter:description" content="BizManga導入事例・お客様の声">
  <meta name="twitter:image" content="https://bizmanga.contentsx.jp/material/images/og/og-testimonials.webp">

  <script type="application/ld+json" id="testimonialReviewSchema">
  {
    "@context": "https://schema.org",
    "@type": "Review",
    "name": "お客様の声",
    "description": "BizManga 導入事例",
    "url": "https://bizmanga.contentsx.jp/testimonial-detail",
    "itemReviewed": {
      "@type": "Service",
      "name": "BizManga ビジネスマンガ制作",
      "provider": {
        "@type": "Organization",
        "name": "Contents X 株式会社",
        "url": "https://contentsx.jp"
      }
    },
    "reviewRating": {
      "@type": "Rating",
      "ratingValue": "5",
      "bestRating": "5"
    },
    "author": { "@type": "Organization", "name": "導入企業" }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "ホーム", "item": "https://bizmanga.contentsx.jp/" },
      { "@type": "ListItem", "position": 2, "name": "お客様の声", "item": "https://bizmanga.contentsx.jp/testimonials" },
      { "@type": "ListItem", "position": 3, "name": "事例詳細", "item": "https://bizmanga.contentsx.jp/testimonial-detail" }
    ]
  }
  </script>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/webp" href="material/images/logo/bm-icon.webp">
  <link rel="stylesheet" href="css/bizmanga.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

  <style>
    .tm-detail-section {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 60vh;
      background: #fff;
    }
    .tm-detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--bm-accent);
      text-decoration: none;
      margin-bottom: 32px;
      transition: opacity 0.3s;
    }
    .tm-detail-back:hover { opacity: 0.7; }
    .tm-detail-loading,
    .tm-detail-error {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .tm-detail-article {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px;
      display: none;
    }
    .tm-detail-hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: 32px;
      background: #f5f5f5;
    }
    .tm-detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .tm-detail-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .tm-detail-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: var(--bm-accent);
      border: 1px solid var(--bm-accent);
      border-radius: 4px;
      padding: 4px 12px;
    }
    .tm-detail-heading {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 900;
      color: #222;
      line-height: 1.5;
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }
    .tm-detail-content {
      font-size: 16px;
      color: #333;
      line-height: 2;
    }
    .tm-detail-content p { margin-bottom: 1.2em; }
    .tm-detail-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 24px 0;
    }
    .tm-detail-content h2,
    .tm-detail-content h3 {
      font-weight: 800;
      margin: 2em 0 0.6em;
      color: #222;
    }
    .tm-detail-content blockquote {
      margin: 28px 0;
      padding: 24px 28px;
      background: rgba(235, 82, 0, 0.04);
      border-left: 4px solid var(--bm-accent);
      font-style: italic;
      color: #555;
      border-radius: 4px;
    }
    .tm-detail-cta {
      display: flex;
      gap: 12px;
      margin: 48px 0 32px;
      flex-wrap: wrap;
    }
    .tm-detail-cta a {
      flex: 1;
      min-width: 180px;
      padding: 18px 28px;
      background: var(--bm-accent);
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(235, 82, 0, 0.2);
    }
    .tm-detail-cta a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(235, 82, 0, 0.3);
    }
    .tm-detail-cta a.ghost {
      background: #fff;
      color: var(--bm-accent);
      border: 2px solid var(--bm-accent);
      box-shadow: none;
    }
    .tm-detail-share {
      padding: 24px 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
      margin-bottom: 40px;
    }
    .tm-detail-share-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .tm-detail-share-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tm-detail-share-btns a,
    .tm-detail-share-btns button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      height: 36px;
      padding: 0 16px;
      background: #f5f5f5;
      color: #333;
      border: none;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .tm-detail-share-btns a:hover,
    .tm-detail-share-btns button:hover {
      background: rgba(235, 82, 0, 0.08);
      color: var(--bm-accent);
    }
    .tm-detail-related {
      margin-top: 48px;
    }
    .tm-detail-related h3 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #222;
    }
    .tm-detail-related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .tm-detail-related-card {
      display: block;
      text-decoration: none;
      color: #333;
      transition: transform 0.2s;
    }
    .tm-detail-related-card:hover { transform: translateY(-4px); }
    .tm-detail-related-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .tm-detail-related-card .t {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }
    .tm-detail-related-card .tag {
      display: inline-block;
      font-size: 10px;
      color: var(--bm-accent);
      border: 1px solid var(--bm-accent);
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    @media (max-width: 768px) {
      .tm-detail-hero { aspect-ratio: 4/3; }
      .tm-detail-cta { flex-direction: column; }
      .tm-detail-cta a { min-width: 100%; }
      .tm-detail-related-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }
  </style>
</head>
<body>

  <header class="bm-header" id="bmHeader">
    <div class="bm-header-inner">
      <a href="./" class="bm-logo">
        <img src="https://contentsx.jp/material/images/logo/bizmanga-logo.webp" alt="BizManga" class="bm-logo-img">
      </a>
      <nav class="bm-nav" id="bmNav"></nav>
      <div class="bm-header-right">
        <button class="bm-hamburger" id="bmHamburger" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="tm-detail-section">
      <div class="bm-container">
        <a href="testimonials" class="tm-detail-back">&larr; お客様の声一覧へ戻る</a>

        <div class="tm-detail-loading" id="tmDetailLoading">
          <p>読み込み中...</p>
        </div>

        <div class="tm-detail-error" id="tmDetailError" style="display:none;">
          <p>記事が見つかりませんでした。</p>
          <p><a href="testimonials" style="color:var(--bm-accent);">一覧に戻る</a></p>
        </div>

        <article class="tm-detail-article" id="tmDetailArticle">
          <div class="tm-detail-hero" id="tmDetailHero"></div>
          <div class="tm-detail-meta">
            <span class="tm-detail-tag" id="tmDetailTag" style="display:none;"></span>
          </div>
          <h1 class="tm-detail-heading" id="tmDetailHeading"></h1>
          <div class="tm-detail-content" id="tmDetailContent"></div>

          <div class="tm-detail-cta">
            <a href="contact">無料相談する</a>
            <a href="works" class="ghost">他の事例を見る</a>
          </div>

          <div class="tm-detail-share">
            <span class="tm-detail-share-label">この事例をシェア</span>
            <div class="tm-detail-share-btns" id="tmDetailShareBtns"></div>
          </div>

          <div class="tm-detail-related" id="tmDetailRelated" style="display:none;">
            <h3>関連事例</h3>
            <div class="tm-detail-related-grid" id="tmDetailRelatedGrid"></div>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="bm-footer">
    <div class="bm-container">
      <div class="bm-footer-inner">
        <div class="bm-footer-brand">
          <img src="https://contentsx.jp/material/images/logo/bizmanga-logo.webp" alt="BizManga" class="bm-footer-logo">
          <p class="bm-footer-company">Contents X 株式会社</p>
          <p class="bm-footer-address">東京都目黒区目黒2-11-15 8階</p>
        </div>
      </div>
      <p class="bm-footer-copy">© Contents X 株式会社 2026 All rights reserved.</p>
    </div>
  </footer>

  <script>
    (async function() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');

      const loadingEl = document.getElementById('tmDetailLoading');
      const errorEl = document.getElementById('tmDetailError');
      const articleEl = document.getElementById('tmDetailArticle');

      if (!id) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        return;
      }

      const apiBase = (window.BM_WP_CONFIG && window.BM_WP_CONFIG.apiBase)
        ? window.BM_WP_CONFIG.apiBase.replace(/\/+$/, '')
        : 'https://cms.contentsx.jp/wp-json/contentsx/v1';

      try {
        const res = await fetch(apiBase + '/testimonials/' + encodeURIComponent(id));
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        const title = data.heading || 'お客様の声';
        const tag = data.tag || '';
        const thumb = data.thumbnail || '';
        const content = data.content || ('<p>' + (data.excerpt || '') + '</p>');
        const articleUrl = 'https://bizmanga.contentsx.jp/testimonial-detail?id=' + encodeURIComponent(id);

        // Title & meta update
        document.title = title + ' - 導入事例 | BizManga';
        const setMeta = (sel, attr, val) => {
          const el = document.querySelector(sel);
          if (el) el.setAttribute(attr, val);
        };
        const plainExcerpt = (data.excerpt || content.replace(/<[^>]+>/g, '').slice(0, 120));
        setMeta('link[rel="canonical"]', 'href', articleUrl);
        setMeta('meta[name="description"]', 'content', plainExcerpt);
        setMeta('meta[property="og:url"]', 'content', articleUrl);
        setMeta('meta[property="og:title"]', 'content', title + ' - 導入事例 | BizManga');
        setMeta('meta[property="og:description"]', 'content', plainExcerpt);
        setMeta('meta[name="twitter:title"]', 'content', title + ' - 導入事例 | BizManga');
        setMeta('meta[name="twitter:description"]', 'content', plainExcerpt);
        if (thumb) {
          setMeta('meta[property="og:image"]', 'content', thumb);
          setMeta('meta[name="twitter:image"]', 'content', thumb);
        }

        // Review JSON-LD 動的更新
        const oldLd = document.getElementById('testimonialReviewSchema');
        if (oldLd) oldLd.remove();
        const ld = document.createElement('script');
        ld.type = 'application/ld+json';
        ld.id = 'testimonialReviewSchema';
        ld.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "Review",
          "name": title,
          "description": plainExcerpt,
          "url": articleUrl,
          "image": thumb || undefined,
          "datePublished": new Date().toISOString().slice(0, 10),
          "itemReviewed": {
            "@type": "Service",
            "name": "BizManga ビジネスマンガ制作",
            "provider": {
              "@type": "Organization",
              "name": "Contents X 株式会社",
              "url": "https://contentsx.jp"
            }
          },
          "reviewRating": {
            "@type": "Rating",
            "ratingValue": "5",
            "bestRating": "5",
            "worstRating": "1"
          },
          "author": {
            "@type": "Organization",
            "name": tag ? (tag + "業界の導入企業") : "導入企業"
          },
          "reviewBody": plainExcerpt
        });
        document.head.appendChild(ld);

        // Render
        if (thumb) {
          document.getElementById('tmDetailHero').innerHTML =
            '<img src="' + thumb + '" alt="' + title + '" style="object-position:' + (data.img_position || 'center') + ';">';
        }
        if (tag) {
          const tagEl = document.getElementById('tmDetailTag');
          tagEl.textContent = tag;
          tagEl.style.display = '';
        }
        document.getElementById('tmDetailHeading').textContent = title;
        /* XSS対策: 既知のタグのみ許可 */
        const contentEl = document.getElementById('tmDetailContent');
        const tmpDiv = document.createElement('div');
        tmpDiv.innerHTML = content;
        tmpDiv.querySelectorAll('script,iframe,object,embed,form,style,link,meta,base,svg,math').forEach(e => e.remove());
        tmpDiv.querySelectorAll('*').forEach(el => {
          Array.from(el.attributes).forEach(attr => {
            if (attr.name.startsWith('on') || /^(javascript:|data:text\/html)/i.test((attr.value || '').trim())) {
              el.removeAttribute(attr.name);
            }
          });
        });
        contentEl.innerHTML = tmpDiv.innerHTML;

        // Share
        const shareText = encodeURIComponent(title + ' - BizManga導入事例');
        const shareUrl = encodeURIComponent(articleUrl);
        document.getElementById('tmDetailShareBtns').innerHTML =
          '<a href="https://twitter.com/intent/tweet?text=' + shareText + '&url=' + shareUrl + '" target="_blank" rel="noopener noreferrer">X</a>' +
          '<a href="https://social-plugins.line.me/lineit/share?url=' + shareUrl + '" target="_blank" rel="noopener noreferrer">LINE</a>' +
          '<a href="https://www.facebook.com/sharer/sharer.php?u=' + shareUrl + '" target="_blank" rel="noopener noreferrer">FB</a>' +
          '<button type="button" id="tmDetailCopy">URLをコピー</button>';
        document.getElementById('tmDetailCopy').addEventListener('click', function() {
          navigator.clipboard && navigator.clipboard.writeText(articleUrl).then(() => {
            this.textContent = 'コピーしました';
            setTimeout(() => { this.textContent = 'URLをコピー'; }, 2000);
          });
        });

        // Related (同タグ)
        try {
          const resAll = await fetch(apiBase + '/testimonials?site=bizmanga');
          const all = await resAll.json();
          const related = all.filter(x => x.id !== parseInt(id, 10) && x.tag === tag).slice(0, 3);
          if (related.length > 0) {
            const grid = document.getElementById('tmDetailRelatedGrid');
            grid.innerHTML = related.map(r =>
              '<a class="tm-detail-related-card" href="testimonial-detail?id=' + r.id + '">' +
              (r.thumbnail ? '<img src="' + r.thumbnail + '" alt="" loading="lazy">' : '') +
              (r.tag ? '<span class="tag">' + r.tag + '</span>' : '') +
              '<span class="t">' + (r.heading || '') + '</span>' +
              '</a>'
            ).join('');
            document.getElementById('tmDetailRelated').style.display = '';
          }
        } catch(e) {}

        loadingEl.style.display = 'none';
        articleEl.style.display = 'block';

      } catch (e) {
        console.warn('testimonial load failed', e);
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
      }
    })();
  </script>
  <script src="js/bm-i18n.js" defer></script>
  <script src="js/bm-nav.js" defer></script>
</body>
</html>
